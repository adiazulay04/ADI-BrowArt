<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עדי אזולאי – BrowArt</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', sans-serif;
      color: #4a2e1a;
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(170deg, #8a5a32 0%, #6e4322 50%, #4a2a12 100%);
      padding: 40px 14px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ===== CENTER CARD ===== */
    .page-card {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(170deg, #e8c99a 0%, #d4a96a 35%, #c8956c 65%, #b87a50 100%);
      border-radius: 26px;
      box-shadow: 0 14px 44px rgba(20,8,0,0.45);
      overflow: hidden;
    }

    /* ===== HERO ===== */
    .hero {
      padding: 60px 20px 44px;
      text-align: center;
    }

    .logo-wrap img {
      width: 320px;
      max-width: 82vw;
      filter: drop-shadow(0 3px 10px rgba(80,40,10,0.2));
      margin-bottom: 28px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .info-box {
      max-width: 330px;
      margin: 0 auto;
      text-align: center;
      background: rgba(255,248,235,0.45);
      border: 1px solid rgba(150,90,40,0.2);
      border-radius: 14px;
      padding: 16px 20px;
      backdrop-filter: blur(6px);
    }

    .location {
      font-size: 1.15rem;
      font-weight: 600;
      color: #4a2e1a;
      margin-bottom: 10px;
      text-align: center;
    }

    .cancel-line {
      font-size: 0.95rem;
      color: #5c3218;
      margin-bottom: 5px;
      text-align: center;
    }

    .cancel-fee {
      font-size: 0.88rem;
      color: #7a4828;
      font-weight: 500;
      text-align: center;
    }

    /* ===== DIVIDER ===== */
    .divider {
      width: 70px;
      height: 2px;
      background: rgba(74,46,26,0.45);
      border-radius: 2px;
      margin: 36px auto 18px;
    }

    /* ===== SERVICES ===== */
    .section {
      padding: 0 20px 50px;
      max-width: 520px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      font-size: 1.45rem;
      font-weight: 700;
      color: #3d2010;
      margin-bottom: 26px;
    }
    .section-title::after {
      content: '';
      display: block;
      width: 70px;
      height: 2px;
      background: rgba(74,46,26,0.45);
      border-radius: 2px;
      margin: 18px auto 0;
    }

    .services-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .service-item {
      background: rgba(255,248,235,0.55);
      border-radius: 14px;
      padding: 15px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 12px rgba(100,50,15,0.1);
      border: 1px solid rgba(150,90,40,0.2);
      backdrop-filter: blur(8px);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .service-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(100,50,15,0.16);
    }

    .service-name { font-size: 1rem; font-weight: 600; color: #3d2010; }
    .service-price {
      font-size: 1.05rem; font-weight: 700; color: #7a4010;
      background: rgba(150,90,40,0.15);
      padding: 4px 14px; border-radius: 20px;
    }

    /* ===== CTA ===== */
    .cta-section {
      padding: 0 20px 60px;
      text-align: center;
    }

    .social-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .wa-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      background: #25D366;
      border-radius: 50%;
      text-decoration: none;
      box-shadow: 0 6px 22px rgba(37,211,102,0.32);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .wa-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(37,211,102,0.42);
    }

    .ig-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      background: linear-gradient(45deg, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      border-radius: 50%;
      text-decoration: none;
      box-shadow: 0 6px 22px rgba(204,35,102,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .ig-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(204,35,102,0.42);
    }

    footer {
      text-align: center;
      padding: 18px;
      background: rgba(60,30,10,0.35);
      color: rgba(255,240,215,0.9);
      font-size: 0.82rem;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
